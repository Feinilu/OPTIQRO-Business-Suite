<style>*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:#f5f7fb;

}

.layout{

display:flex;
height:100vh;

}

.sidebar{

width:260px;
background:#14213d;
color:white;

}

.logo{

padding:30px;
text-align:center;

}

.logo img{

width:170px;

}

.sidebar ul{

list-style:none;

}

.sidebar li{

padding:18px 30px;
cursor:pointer;
transition:.3s;

}

.sidebar li:hover{

background:#1f3158;

}

.active{

background:#29457a;

}

.contenido{

flex:1;
padding:40px;

}

header h1{

font-size:34px;

}

header p{

color:#666;
margin-top:8px;

}

.cards{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:25px;

margin-top:40px;

}

.card{

background:white;

border-radius:18px;

padding:30px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}

.card h3{

color:#666;

font-size:18px;

}

.card span{

font-size:42px;

font-weight:bold;
